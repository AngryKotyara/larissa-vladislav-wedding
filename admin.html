<!doctype html><html lang="ru"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Администратор — Larissa & Vladislav</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/admin.css"></head><body>
<main>
<section id="loginView" class="login-card"><p class="kicker">Larissa & Vladislav</p><h1>Личный кабинет</h1><form id="loginForm"><label>Логин<input name="login" required></label><label>Пароль<input name="password" type="password" required></label><button>Войти</button><p id="loginMessage"></p></form></section>
<section id="dashboard" class="hidden"><header><div><p class="kicker">22.08.2026</p><h1>Список гостей</h1></div><div class="actions"><a href="/api/admin/export.csv">Скачать CSV</a><button id="logout">Выйти</button></div></header>
<div id="stats" class="stats"></div>
<div class="panel"><h2>Новое персональное приглашение</h2><form id="createForm" class="create-form"><label>Имя гостя или семьи<input name="guestNames" placeholder="Ирина и Сергей" required></label><label>Обращение<input name="greeting" value="Дорогие гости"></label><button>Создать ссылку</button></form><div id="createdLink"></div></div>
<div class="panel"><div class="table-head"><h2>Приглашения</h2><input id="search" placeholder="Поиск по имени"></div><div class="table-wrap"><table><thead><tr><th>Гость</th><th>Статус</th><th>Ответивший</th><th>Ссылка</th><th></th></tr></thead><tbody id="inviteRows"></tbody></table></div></div>
</section></main><script src="/admin.js"></script></body></html>
